{# sessions.html — sessions list with agent badge, billing badge, outlier flag, search/filter #}
{% extends "base.html" %}

{% block title %}Sessions — burnmap{% endblock %}

{% block content %}
<div x-data="sessionsPage()" x-init="load()">

  <div class="page-header">
    <h1 class="page-title">Sessions</h1>
    <span class="meta" style="font-size:12px;color:var(--ink-3)">browse · search · filter</span>
  </div>

  <!-- Search + filter controls -->
  <div class="row" style="margin-bottom:14px;gap:8px;flex-wrap:wrap">
    <input class="search-input"
           type="search"
           placeholder="Search session ID…"
           x-model="search"
           @input.debounce.300ms="load()"/>
    <select class="sort-select" x-model="agentFilter" @change="load()">
      <option value="">Agent: any</option>
      <option value="claude_code">claude_code</option>
      <option value="codex">codex</option>
      <option value="aider">aider</option>
    </select>
    <span class="spacer"></span>
    <span class="mono muted" style="font-size:11px;align-self:center"
          x-text="count + ' sessions'"></span>
  </div>

  <template x-if="loading">
    <div class="loading-row">Loading…</div>
  </template>

  <template x-if="!loading && rows.length === 0">
    <div class="loading-row">No sessions found.</div>
  </template>

  <template x-if="!loading && rows.length > 0">
    <div class="card" style="overflow-x:auto">
      <table class="t">
        <thead>
          <tr>
            <th>Session</th>
            <th>Agent</th>
            <th>Started</th>
            <th class="right">Spans</th>
            <th class="right">Tokens</th>
            <th class="right">Cost</th>
            <th>Outlier</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="s in rows" :key="s.id">
            <tr>
              <td>
                <span class="mono" style="font-size:12px" x-text="s.id.slice(0,16) + '…'"></span>
              </td>
              <td>
                <span class="agent-badge"
                      :class="'agent-badge--' + s.agent"
                      x-text="s.agent ? s.agent.replace(/_/g,' ') : '—'"></span>
              </td>
              <td class="mono muted" style="font-size:11px" x-text="fmtTime(s.started_at)"></td>
              <td class="num right" x-text="(s.span_count || 0).toLocaleString()"></td>
              <td class="num right" x-text="fmtTok(s.total_tokens)"></td>
              <td class="num right mono" x-text="'$' + (s.total_cost_usd || 0).toFixed(4)"></td>
              <td>
                <template x-if="s.has_outlier">
                  <span class="chip chip--outlier">outlier</span>
                </template>
                <template x-if="!s.has_outlier">
                  <span class="mono muted">—</span>
                </template>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </template>

</div>

<style>
.page-header  { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
.page-title   { font-size:20px; font-weight:600; }
.loading-row  { padding:40px; text-align:center; color:var(--ink-3,#888); font-size:14px; }
.search-input { font-size:13px; padding:5px 10px; border:1px solid var(--rule-soft,#ddd); border-radius:4px; min-width:260px; }
.sort-select  { font-size:13px; padding:4px 8px; border:1px solid var(--rule-soft,#ddd); border-radius:4px; }
.agent-badge            { display:inline-block; padding:1px 7px; border-radius:4px; font-size:11px; font-family:var(--font-mono); background:#e5e7eb; color:#374151; }
.agent-badge--claude_code { background:#dbeafe; color:#1e40af; }
.agent-badge--codex       { background:#dcfce7; color:#14532d; }
.agent-badge--aider       { background:#fce7f3; color:#831843; }
.chip         { display:inline-block; padding:1px 7px; border-radius:4px; font-size:11px; font-family:var(--font-mono); }
.chip--outlier { background:#fee2e2; color:#991b1b; }
</style>

<script>
function sessionsPage() {
  return {
    rows: [],
    count: 0,
    loading: false,
    search: '',
    agentFilter: '',

    async load() {
      this.loading = true;
      try {
        let url = '/api/sessions?limit=200';
        if (this.search) url += '&search=' + encodeURIComponent(this.search);
        if (this.agentFilter) url += '&agent=' + encodeURIComponent(this.agentFilter);
        const r = await fetch(url);
        const d = await r.json();
        this.rows  = d.sessions || [];
        this.count = d.count || 0;
      } finally {
        this.loading = false;
      }
    },

    fmtTime(ms) {
      if (!ms) return '—';
      return new Date(ms).toLocaleString(undefined, {
        month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit',
      });
    },

    fmtTok(n) {
      if (!n) return '0';
      if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
      if (n >= 1_000) return (n / 1_000).toFixed(1) + 'K';
      return String(n);
    },
  };
}
</script>
{% endblock %}
